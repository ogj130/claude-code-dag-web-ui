<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- 背景渐变：紫蓝色系 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <!-- 节点渐变：青色到蓝色 -->
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="256" height="256" rx="56" fill="url(#bgGrad)"/>

  <!-- DAG 流程图 - 简化版 -->
  <!-- 连接线 -->
  <path d="M 80 80 L 128 128" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M 176 80 L 128 128" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M 128 128 L 128 176" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- 节点 - 圆形设计 -->
  <circle cx="80" cy="80" r="20" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="176" cy="80" r="20" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="128" cy="176" r="20" fill="url(#nodeGrad)" filter="url(#glow)"/>

  <!-- 中心节点装饰 - 小圆点 -->
  <circle cx="128" cy="128" r="8" fill="#ffffff" opacity="0.9"/>

  <!-- 底部品牌标识 -->
  <text x="128" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">CC Web UI</text>
</svg>
