<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAG Query 折叠交互预览</title>
<style>
  :root {
    --bg-root: #0d1117;
    --bg-card: #161b22;
    --bg-bar: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-dim: #388bfd80;
    --success: #3fb950;
    --success-bg: rgba(63,185,80,0.06);
    --success-border: rgba(63,185,80,0.15);
    --warn: #d29922;
    --warn-bg: rgba(210,153,34,0.06);
    --dag-bg: #0d1117;
    --dag-dot: #30363d40;
  }

  body {
    margin: 0;
    padding: 20px;
    background: var(--bg-root);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
  }

  h1 {
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  h2 {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 20px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* ── DAG 可视化 ── */
  .dag-view {
    background: var(--bg-root);
    background-image: radial-gradient(circle, var(--dag-dot) 1px, transparent 1px);
    background-size: 24px 24px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    min-height: 480px;
    position: relative;
    overflow: hidden;
  }

  .node {
    position: absolute;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    text-align: left;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
  }

  .node.agent {
    border-color: var(--warn);
    background: var(--warn-bg);
    width: 120px;
    text-align: center;
    left: 50%;
    transform: translateX(-50%);
  }

  .node.query {
    border-color: var(--accent);
    background: rgba(88,166,255,0.06);
    min-width: 130px;
    cursor: pointer;
  }

  .node.query:hover {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(88,166,255,0.2);
  }

  .node.query .collapse-icon {
    position: absolute;
    top: 6px;
    left: 6px;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    font-size: 8px;
    color: var(--bg-root);
    font-weight: bold;
    transition: background 0.15s;
    user-select: none;
  }

  .node.query .collapse-icon:hover {
    background: var(--text-primary);
  }

  .node.query .node-label {
    padding-left: 14px;
  }

  .node.query.collapsed {
    opacity: 0.75;
    border-color: var(--text-muted);
  }

  .node.tool {
    border-color: var(--border);
    min-width: 90px;
    text-align: center;
  }

  .node.summary {
    border-color: var(--success);
    background: var(--success-bg);
    width: 160px;
    text-align: center;
  }

  .node-icon {
    text-align: center;
    margin-bottom: 4px;
    font-size: 16px;
  }

  .node-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }

  .node-status {
    font-size: 9px;
    color: var(--text-muted);
    font-family: monospace;
  }

  .status-completed { color: var(--success); }
  .status-running { color: var(--warn); }

  .node-detail-btn {
    margin-top: 5px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-size: 9px;
    color: var(--accent-dim);
    font-family: monospace;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .node-detail-btn:hover { color: var(--accent); }

  /* ── 连接线（SVG）── */
  .edges-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  .edge {
    fill: none;
    stroke-width: 1.5;
  }

  /* ── 控制面板 ── */
  .controls {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .ctrl-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-right: 4px;
  }

  button {
    background: var(--bg-bar);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    color: var(--text-secondary);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }

  button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg-root);
  }

  .state-display {
    background: var(--bg-bar);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  .state-key { color: var(--accent); }
  .state-val { color: var(--success); }
  .state-empty { color: var(--text-muted); font-style: italic; }
</style>
</head>
<body>

<h1>DAG Query 折叠交互预览</h1>
<p class="hint">点击 query 节点左上角的 ▼/▶ 图标即可切换折叠状态</p>

<div class="dag-view" id="dagView">
  <!-- SVG edges -->
  <svg class="edges-svg" id="edgesSvg"></svg>

  <!-- main-agent -->
  <div class="node agent" id="node-main-agent" style="top:20px;">
    <div class="node-icon">🤖</div>
    <div class="node-label">Claude Agent</div>
    <div class="node-status status-running">运行中</div>
  </div>
  <div class="node query" id="node-q1" style="top:150px; left:200px;">
    <div class="collapse-icon" id="icon-q1" onclick="toggleQuery('q1')">▼</div>
    <div class="node-label">Q1: 你好啊</div>
    <div class="node-status status-completed">完成</div>
    <button class="node-detail-btn" onclick="event.stopPropagation()">▶ 查看详情</button>
  </div>

  <!-- Q1 tool1 -->
  <div class="node tool" id="node-q1-t1" style="top:270px; left:100px;">
    <div class="node-icon">🔧</div>
    <div class="node-label">Grep</div>
    <div class="node-status status-completed">完成</div>
  </div>

  <!-- Q1 tool2 -->
  <div class="node tool" id="node-q1-t2" style="top:270px; left:260px;">
    <div class="node-icon">📄</div>
    <div class="node-label">Read</div>
    <div class="node-status status-completed">完成</div>
  </div>

  <!-- Q1 summary -->
  <div class="node summary" id="node-q1-s" style="top:150px; left:420px;">
    <div class="node-icon">📋</div>
    <div class="node-label">总结</div>
    <div class="node-status status-completed">完成</div>
    <button class="node-detail-btn" onclick="event.stopPropagation()">▶ 查看总结</button>
  </div>

  <!-- Q2 query -->
  <div class="node query" id="node-q2" style="top:390px; left:200px;">
    <div class="collapse-icon" id="icon-q2" onclick="toggleQuery('q2')">▼</div>
    <div class="node-label">Q2: 帮我分析一下</div>
    <div class="node-status status-running">运行中</div>
    <button class="node-detail-btn" onclick="event.stopPropagation()">▶ 查看详情</button>
  </div>

  <!-- Q2 tool1 -->
  <div class="node tool" id="node-q2-t1" style="top:510px; left:100px;">
    <div class="node-icon">🔍</div>
    <div class="node-label">WebSearch</div>
    <div class="node-status status-running">运行中</div>
  </div>

  <!-- Q2 tool2 (placeholder) -->
  <div class="node tool" id="node-q2-t2" style="top:510px; left:260px;">
    <div class="node-icon">📄</div>
    <div class="node-label">Read</div>
    <div class="node-status status-running">运行中</div>
  </div>

  <!-- Q2 summary (placeholder, hidden initially) -->
  <div class="node summary" id="node-q2-s" style="top:390px; left:420px;">
    <div class="node-icon">📋</div>
    <div class="node-label">总结</div>
    <div class="node-status status-completed">完成</div>
    <button class="node-detail-btn" onclick="event.stopPropagation()">▶ 查看总结</button>
  </div>
</div>

<div class="controls">
  <span class="ctrl-label">快速操作：</span>
  <button id="btn-collapse-q1" onclick="toggleQuery('q1')">折叠 Q1</button>
  <button id="btn-collapse-q2" onclick="toggleQuery('q2')">折叠 Q2</button>
  <button id="btn-expand-all" onclick="expandAll()">展开全部</button>
  <button id="btn-reset" onclick="resetDag()">重置</button>
</div>

<div class="state-display" id="stateDisplay">
  <span class="state-key">collapsedQueryIds</span>: <span class="state-empty">[]</span>
</div>

<script>
  // 状态
  const state = {
    collapsedQueryIds: new Set()
  };

  function updateStateDisplay() {
    const container = document.getElementById('stateDisplay');
    const ids = Array.from(state.collapsedQueryIds);
    const valSpan = ids.length > 0
      ? `<span class="state-val">${JSON.stringify(ids)}</span>`
      : `<span class="state-empty">[]</span>`;
    container.innerHTML = `<span class="state-key">collapsedQueryIds</span>: ${valSpan}`;

    // 更新按钮状态
    document.getElementById('btn-collapse-q1').classList.toggle('active', state.collapsedQueryIds.has('q1'));
    document.getElementById('btn-collapse-q2').classList.toggle('active', state.collapsedQueryIds.has('q2'));
  }

  function toggleQuery(queryId) {
    if (state.collapsedQueryIds.has(queryId)) {
      state.collapsedQueryIds.delete(queryId);
    } else {
      state.collapsedQueryIds.add(queryId);
    }
    render();
  }

  function expandAll() {
    state.collapsedQueryIds.clear();
    render();
  }

  function resetDag() {
    state.collapsedQueryIds.clear();
    render();
  }

  function render() {
    renderNodes();
    renderEdges();
    updateStateDisplay();
  }

  function renderNodes() {
    // Q1 相关
    const q1Collapsed = state.collapsedQueryIds.has('q1');
    const q1Node = document.getElementById('node-q1');
    const iconQ1 = document.getElementById('icon-q1');
    q1Node.classList.toggle('collapsed', q1Collapsed);
    iconQ1.textContent = q1Collapsed ? '▶' : '▼';
    document.getElementById('node-q1-t1').style.display = q1Collapsed ? 'none' : 'block';
    document.getElementById('node-q1-t2').style.display = q1Collapsed ? 'none' : 'block';
    document.getElementById('node-q1-s').style.display = q1Collapsed ? 'none' : 'block';

    // Q2 相关
    const q2Collapsed = state.collapsedQueryIds.has('q2');
    const q2Node = document.getElementById('node-q2');
    const iconQ2 = document.getElementById('icon-q2');
    q2Node.classList.toggle('collapsed', q2Collapsed);
    iconQ2.textContent = q2Collapsed ? '▶' : '▼';
    document.getElementById('node-q2-t1').style.display = q2Collapsed ? 'none' : 'block';
    document.getElementById('node-q2-s').style.display = q2Collapsed ? 'none' : 'block';
  }

  function renderEdges() {
    const svg = document.getElementById('edgesSvg');
    svg.innerHTML = '';

    const q1Collapsed = state.collapsedQueryIds.has('q1');
    const q2Collapsed = state.collapsedQueryIds.has('q2');

    // ── 实测精确坐标（相对 dag-view）────────────────────────────────
    // main-agent:  top=21, left=760, w=151, h=76  → 中心x=835.5, 底部y=97
    // Q1 query:    top=151, left=201, w=161, h=71  → 右侧x=362, 底部y=222
    // Q1 tool1:   top=271, left=101, w=121, h=76  → 中心x=161.5, 顶部y=271
    // Q1 tool2:    top=271, left=261, w=121, h=76  → 中心x=321.5
    // Q1 summary:  top=151, left=421, w=191, h=96   → 右侧x=612, 底部y=247
    // Q2 query:    top=391, left=201, w=161, h=71  → 右侧x=362, 顶部y=391, 底部y=462
    // Q2 tool1:    top=511, left=101, w=121, h=76  → 中心x=161.5, 顶部y=511
    // Q2 tool2:    top=511, left=261, w=121, h=76  → 中心x=321.5
    // Q2 summary:  top=391, left=421, w=191, h=96   → 右侧x=612, 顶部y=391

    const MA_X = 836;   // main-agent 中心 x
    const MA_BOT = 97;  // main-agent 底部 y

    const Q1_X  = 362;  // Q1 query 右侧 x
    const Q1_YT = 151;  // Q1 query 顶部 y
    const Q1_YB = 222;  // Q1 query 底部 y

    const Q1S_X = 421;  // Q1 summary 左侧 x
    const Q1S_YT = 151; // Q1 summary 顶部 y
    const Q1S_YB = 247; // Q1 summary 底部 y

    const Q2_X  = 362;  // Q2 query 右侧 x
    const Q2_YT = 391;  // Q2 query 顶部 y
    const Q2_YB = 462;  // Q2 query 底部 y

    const T1_X  = 162;   // tool1 中心 x
    const T2_X  = 322;   // tool2 中心 x
    const T_YT  = 271;   // Q1 tools 顶部 y
    const T2_YT = 511;   // Q2 tools 顶部 y
    const T_YB  = 347;   // tools 底部 y
    const T2_YB = 587;   // Q2 tools 底部 y

    // 列间水平通道 x（Q1/Q2 query 列和 summary 列之间）
    const CHAN_X = 380;

    // 竖直主干道的 x（所有水平连接汇聚到同一 x）
    const SPINE_X = CHAN_X;

    // Y 轴档位
    const Y_TOOL  = 309;  // tools 行中间 y = (T_YT + T_YB) / 2
    const Y_TOOL2 = 549;  // Q2 tools 行中间

    const lines = [];

    function edge(x1, y1, x2, y2, color, dashed = false) {
      const dash = dashed ? 'stroke-dasharray="6,3"' : '';
      return `<path d="M${x1},${y1} L${x2},${y2}" stroke="${color}" stroke-width="1.5" fill="none" ${dash}/>`;
    }

    // ── 1. main-agent → Q1 ─────────────────────────────────────────
    if (!q1Collapsed) {
      lines.push(edge(MA_X, MA_BOT, MA_X, Q1_YT, '#d29922', true));
    } else {
      // Q1 折叠：垂直向下到通道，再水平到 SPINE_X
      lines.push(edge(MA_X, MA_BOT, MA_X, Y_TOOL, '#d29922', true));
      lines.push(edge(MA_X, Y_TOOL, SPINE_X, Y_TOOL, '#d29922', true));
    }

    // ── 2. Q1 → Q2 时序链路 ─────────────────────────────────────
    if (!q1Collapsed) {
      // Q1 展开：Q1 summary 底部 → 水平到通道 → 垂直到 Q2 顶部
      lines.push(edge(Q1S_X, Q1S_YB, SPINE_X, Q1S_YB, '#6e7681', true));
      lines.push(edge(SPINE_X, Q1S_YB, SPINE_X, Q2_YT, '#6e7681', true));
    } else {
      // Q1 折叠：直接从 SPINE_X 竖直向下到 Q2 顶部（Q1 工具和总结都隐藏）
      lines.push(edge(SPINE_X, Y_TOOL, SPINE_X, Q2_YT, '#6e7681', true));
    }

    // ── 3. Q1 内部连接（Q1 未折叠）────────────────────────────────
    if (!q1Collapsed) {
      // Q1 query 底部 → 水平到工具列中心 → 垂直到 tool1 顶部
      lines.push(edge(Q1_X, Q1_YB, SPINE_X, Q1_YB, '#3fb950'));
      lines.push(edge(SPINE_X, Q1_YB, SPINE_X, T_YT, '#3fb950'));
      lines.push(edge(SPINE_X, T_YT, T1_X, T_YT, '#3fb950'));

      // tool1 → tool2 水平
      lines.push(edge(T1_X, Y_TOOL, T2_X, Y_TOOL, '#3fb950'));

      // tool2 → Q1 summary
      lines.push(edge(T2_X, Y_TOOL, SPINE_X, Y_TOOL, '#3fb950'));
      lines.push(edge(SPINE_X, Y_TOOL, SPINE_X, Q1S_YT, '#3fb950'));
      lines.push(edge(SPINE_X, Q1S_YT, Q1S_X, Q1S_YT, '#3fb950'));
    }

    // ── 4. Q2 内部连接（Q2 未折叠）────────────────────────────────
    if (!q2Collapsed) {
      // Q2 query 底部 → 水平到通道 → 垂直到 tool1 顶部
      lines.push(edge(Q2_X, Q2_YB, SPINE_X, Q2_YB, '#3fb950'));
      lines.push(edge(SPINE_X, Q2_YB, SPINE_X, T2_YT, '#3fb950'));
      lines.push(edge(SPINE_X, T2_YT, T1_X, T2_YT, '#3fb950'));

      // tool1 → tool2
      lines.push(edge(T1_X, Y_TOOL2, T2_X, Y_TOOL2, '#3fb950'));

      // tool2 → Q2 summary（虚线，无工具时直连）
      lines.push(edge(T2_X, Y_TOOL2, SPINE_X, Y_TOOL2, '#3fb950'));
      lines.push(edge(SPINE_X, Y_TOOL2, SPINE_X, Q2_YT, '#3fb950'));
      lines.push(edge(SPINE_X, Q2_YT, Q1S_X, Q2_YT, '#3fb950', true));
    }

    svg.innerHTML = lines.join('');
  }

  // 初始化
  render();
</script>
</body>
</html>
