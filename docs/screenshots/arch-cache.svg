<text x="953.3499999999999" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;新建会话&lt;br/&gt;writeSessionImmediately()&lt;br/&gt;立即同步写 IndexedDB&quot;</text>
<text x="2483.425" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;会话更新&lt;br/&gt;writeSessionDebounced(id, updates)&lt;br/&gt;500ms 防抖合并 pendingUpdates&quot;</text>
<text x="3353.325" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;删除会话&lt;br/&gt;cancelDebounce + deleteSession()&lt;br/&gt;同步删除 IndexedDB 记录&quot;</text>
<text x="1923.35" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Query 存储&lt;br/&gt;createQuery() → CCWebDB + stats DB&lt;br/&gt;自动压缩长文本 + 分片&quot;</text>
<text x="953.3499999999999" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;缓存优先加载&lt;br/&gt;loadSessionsCacheFirst(limit)&lt;br/&gt;1. IndexedDB 立即返回&lt;br/&gt;2. 后台 serverSync(&#39;pull&#39;) 拉取&quot;</text>
<text x="1481.25" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;服务端合并&lt;br/&gt;服务端数据优先覆盖&lt;br/&gt;保留仅本地存在的会话&quot;</text>
<text x="1923.35" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;分页查询&lt;br/&gt;getQueriesBySession(page, pageSize)&lt;br/&gt;按 timestamp 降序 + 全文搜索&quot;</text>
<text x="2483.425" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;存储空间监控&lt;br/&gt;isStorageNearlyFull() &gt; 80%&lt;br/&gt;自动驱逐最旧 5 个会话&quot;</text>
<text x="2946.975" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;内存监控&lt;br/&gt;performance.memory.usedJSHeapSize&lt;br/&gt;60s 间隔检查&quot;</text>
<text x="3353.325" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;FIFO 淘汰&lt;br/&gt;会话数 &gt; 100 时&lt;br/&gt;自动删除最旧非活跃会话&quot;</text>
<text x="296.0749999999998" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;isPrivacyModeEnabled()&lt;br/&gt;localStorage 标记&quot;</text>
<text x="296.0749999999998" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;仅 localStorage 存储&lt;br/&gt;不写入 IndexedDB&lt;br/&gt;无网络同步&lt;br/&gt;跳过 RAG 索引&quot;</text>
</svg>