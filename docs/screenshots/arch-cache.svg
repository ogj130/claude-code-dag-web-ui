<rect x="62" y="252" width="568.25" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="1107.0749999999998" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;New Session: writeSessionImmediately() → sync write to IndexedDB&quot;</text>
<text x="3149.05" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Session Update: writeSessionDebounced(id, updates), 500ms debounce merge to pendingUpdates&quot;</text>
<text x="4304.950000000001" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Delete Session: cancelDebounce + deleteSession(), sync delete IndexedDB record&quot;</text>
<text x="2441.725" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Query Store: createQuery() → CCWebDB + stats DB, auto-compress + shard&quot;</text>
<text x="1107.0749999999998" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Cache-First Load: loadSessionsCacheFirst(limit), IndexedDB returns immediately, background serverSync(&#39;pull&#39;)&quot;</text>
<text x="1803" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Server Merge: Server data takes priority, keep local-only sessions&quot;</text>
<text x="2441.725" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Paged Query: getQueriesBySession(page, pageSize), sorted by timestamp desc + full-text search&quot;</text>
<text x="3149.05" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Storage Monitor: isStorageNearlyFull() &gt; 80%, auto-evict oldest 5 sessions&quot;</text>
<text x="3730.575" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Memory Monitor: performance.memory.usedJSHeapSize, 60s interval check&quot;</text>
<text x="4304.950000000001" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;FIFO Eviction: session count &gt; 100, auto-delete oldest inactive sessions&quot;</text>
<text x="346.125" y="114" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;isPrivacyModeEnabled(): localStorage flag&quot;</text>
<text x="346.125" y="270" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;localStorage only: no IndexedDB write, no network sync, skip RAG indexing&quot;</text>
</svg>