<text x="1298.775" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;原始 Answer 文本&lt;br/&gt;(Claude Code 完整输出)&quot;</text>
<text x="1708.175" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;按 Markdown 段落分隔&lt;br/&gt;(## 标题 或 双换行)&quot;</text>
<text x="2246.275" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;长段落按句子分隔&lt;br/&gt;(中文句号 / 英文句号)&quot;</text>
<text x="2930.95" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;约束检查&lt;br/&gt;MAX_CHUNK_SIZE = 1000 字符&lt;br/&gt;MIN_CHUNK_SIZE = 100 字符&lt;br/&gt;不足合并到前一个&quot;</text>
<text x="3515.525" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;每个 chunk 独立 embedding&lt;br/&gt;保留 parentQuery 追溯&quot;</text>
<text x="3939.225" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;写入向量库&lt;br/&gt;chunkType: &#39;answer&#39;&quot;</text>
<text x="219" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;上传文件&lt;br/&gt;docx / xlsx / pptx / txt / md&quot;</text>
<text x="764.25" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;文本提取层&lt;br/&gt;mammoth (DOCX/PPTX)&lt;br/&gt;xlsx (Excel → CSV)&lt;br/&gt;原生 (txt/md)&quot;</text>
<text x="1298.775" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;输出纯文本&lt;br/&gt;进入与 Answer 相同的分块流程&quot;</text>
<text x="2246.275" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;元数据注入&lt;br/&gt;每个 chunk 携带:&lt;br/&gt;• fileName&lt;br/&gt;• mimeType&lt;br/&gt;• attachmentId&quot;</text>
<text x="4427.275000000001" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;统一的 Chunk 格式&lt;br/&gt;chunkType: &#39;attachment&#39;&lt;br/&gt;检索时可通过 type 参数过滤&quot;</text>
<text x="5169.15" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;检索过滤&lt;br/&gt;type=&#39;all&#39; → 混合&lt;br/&gt;type=&#39;conversation&#39; → query+answer+toolcall&lt;br/&gt;type=&#39;attachment&#39; → 仅附件&quot;</text>
