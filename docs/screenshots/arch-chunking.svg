<text x="2963.1249999999995" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Constraints: MAX=1000 chars, MIN=100 chars, merge underflow&quot;</text>
<text x="3587.0249999999996" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Each chunk independently embedded, keeps parentQuery for traceability&quot;</text>
<text x="4150.15" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Write to vector DB with chunkType=&#39;answer&#39;&quot;</text>
<text x="186.825" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Upload: docx/xlsx/pptx/txt/md&quot;</text>
<text x="689.175" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Extract text: mammoth(DOCX/PPTX), xlsx(Excel→CSV), native(txt/md)&quot;</text>
<text x="1291.6249999999998" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Output plain text, enter same chunking pipeline as Answer&quot;</text>
<text x="2364.25" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Metadata injection per chunk: fileName, mimeType, attachmentId&quot;</text>
<text x="4731.15" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Unified Chunk Format: chunkType=&#39;attachment&#39;, filterable by type parameter&quot;</text>
<text x="5487.325000000001" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Retrieval Filter: type=&#39;all&#39; mixed, &#39;conversation&#39; query+answer+toolcall, &#39;attachment&#39; only&quot;</text>
