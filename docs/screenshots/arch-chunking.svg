<text x="1291.6249999999998" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Raw Answer Text from Claude Code&quot;</text>
<text x="1818.9999999999998" y="216" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Split by Markdown headings or double-newline&quot;</text>
