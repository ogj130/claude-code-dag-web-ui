name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Skip GitHub release upload (for testing)'
        required: false
        default: 'false'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: dmg
          - platform: windows-latest
            target: nsis
          - platform: ubuntu-latest
            target: AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install electron dependencies
        run: |
          cd electron
          npm install

      - name: Build Electron app
        run: |
          cd electron
          npm run dist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # macOS codesigning (optional, uncomment if you have certificates)
          # MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          # MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: electron/release/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          files: |
            artifacts/macos-latest-build/**/*.dmg
            artifacts/windows-latest-build/**/*.exe
            artifacts/ubuntu-latest-build/**/*.AppImage
            artifacts/ubuntu-latest-build/**/*.deb
            artifacts/ubuntu-latest-build/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITH_TOKEN }}
